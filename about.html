<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OFFICER_DOSSIER | TPD</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { animation: entry-glitch 0.4s ease-out; }
        @keyframes entry-glitch {
            0% { opacity: 0; filter: brightness(3) contrast(2); transform: scale(1.05); }
            100% { opacity: 1; filter: brightness(1); transform: scale(1); }
        }
        .dossier-grid { display: grid; grid-template-columns: 280px 1fr; gap: 40px; width: 100%; height: 100%; }
        .data-label { color: var(--neon); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 5px; display: block; }
        .data-value { font-size: 1.4rem; color: #fff; margin-bottom: 20px; border-left: 2px solid var(--dim); padding-left: 10px; }
        .bio-text { line-height: 1.5; font-size: 1.1rem; color: var(--text); background: rgba(126, 194, 194, 0.05); padding: 15px; border: 1px solid var(--dim); }
        .back-btn { position: absolute; top: -40px; left: 0; color: var(--neon); text-decoration: none; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="hud-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <main class="main-display" style="grid-column: 1/4; align-items: stretch; position: relative;">
            <a href="index.html" class="back-btn">< BACK_TO_TERMINAL</a>
            <div class="dossier-grid">
                <div style="text-align: center;">
                    <div class="photo-scan-container" style="width: 250px; height: 320px; margin: 0 auto;">
                        <img src="images/profile.jpg" alt="Officer" class="id-photo">
                    </div>
                    <div style="background: var(--re-red); color: white; padding: 5px; margin-top: 10px; letter-spacing: 3px;">RANK: HIGH SCHOOL SENIOR</div>
                </div>

                <div style="overflow-y: auto;">
                    <h1 class="subject-name" style="text-align: left; font-size: 3rem;">OFFICER_SUVD</h1>
                    <div style="font-family: 'DotGothic16'; color: var(--neon); margin-bottom: 30px;">警視庁 // 職員名簿</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><span class="data-label">SECTOR</span><div class="data-value">ULAANBAATAR_08</div></div>
                        <div><span class="data-label">CLEARANCE</span><div class="data-value">LEVEL_12B</div></div>
                    </div>
                    <span class="data-label">BIO_SUMMARY</span>
                    <p class="bio-text">Student specialized in student council, volunteer teaching and digital / social media. Currently interested in law, education and creative projects.</p>
                </div>
            </div>
        </main>
    </div>
    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
