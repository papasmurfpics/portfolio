<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT PORTFOLIO | Level 12</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grid-overlay"></div>

    <nav class="navbar">
        <div class="logo">USER_INTERFACE</div>
        <div class="nav-links">
            <a href="index.html" class="active">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="projects.html">QUESTS</a>
        </div>
    </nav>

    <main class="main-container">
        <div class="game-card">
            <div class="corner-tag">LVL 12</div>
            
            <div class="profile-section">
                <div class="hex-border">
                    <img src="images/profile.jpg" alt="Player Avatar" class="profile-img">
                </div>
                <h1 class="player-name">SUVD ERDENETSOGT</h1>
                <p class="player-class">CLASS: ICT</p>
            </div>

            <div class="stats-container">
                <div class="stat-row">
                    <span>HTML / CSS</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 90%;"></div></div>
                </div>
                <div class="stat-row">
                    <span>JAVASCRIPT</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 65%;"></div></div>
                </div>
                <div class="stat-row">
                    <span>CREATIVITY</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 100%;"></div></div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="projects.html" class="btn-main">START QUESTS</a>
                <a href="about.html" class="btn-sub">VIEW STATS</a>
            </div>
        </div>
    </main>

</body>
</html>
