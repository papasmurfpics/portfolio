<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>METRO_POLICE_ARCHIVE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cursor"></div>

    <div id="login-overlay" onclick="runBiometrics()">
        <div style="font-family: 'DotGothic16'; color: var(--neon); margin-bottom: 10px;">警視庁 // AUTHENTICATION</div>
        <h2 id="log-status" style="font-size: 3.5rem; color: #fff; letter-spacing: 8px;">RESTRICTED</h2>
        <div class="scan-bar" id="bar-container"><div id="scan-progress"></div></div>
        <p id="instruction" style="color: var(--dim); margin-top: 20px;">[ CLICK TO INITIATE BIOMETRIC SCAN ]</p>
    </div>

    <div id="loader-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:100000; flex-direction:column; justify-content:center; align-items:center;">
        <div id="load-text" style="color:var(--neon); font-size:2rem; margin-bottom:10px; font-family:'VT323';">DECRYPTING_FILE...</div>
        <div style="width:300px; height:2px; background:var(--dim);">
            <div id="load-bar" style="width:0%; height:100%; background:var(--neon); box-shadow:0 0 10px var(--neon);"></div>
        </div>
    </div>

    <div class="hud-frame" id="main-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div style="grid-column: 1; font-size: 1rem; color: var(--dim);">
            UNIT: TOKYO_METRO_PD<br>STATUS: <span style="color:#00ff00;">ONLINE</span>
        </div>

        <div style="grid-column: 3; text-align: right; font-size: 1rem; color: var(--dim);">
            SYS_TIME: <span id="clock">00:00:00</span>
        </div>

        <main class="main-display">
            <div class="photo-scan-container">
                <img src="images/profile.jpg" alt="Subject" class="id-photo">
            </div>

            <h1 class="subject-name" id="title-text"></h1>
            
            <nav class="nav-group">
                <a href="javascript:void(0)" onclick="transitionToDossier()" class="nav-item">> OFFICER_DOSSIER</a>
                <a href="projects.html" class="nav-item">> SERVICE_RECORDS</a>
            </nav>
        </main>
    </div>

    <audio id="snd-scan" src="https://www.soundjay.com/button/sounds/button-20.mp3"></audio>
    <audio id="snd-success" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function runBiometrics() {
            const bar = document.getElementById('bar-container');
            const progress = document.getElementById('scan-progress');
            const status = document.getElementById('log-status');
            const instruct = document.getElementById('instruction');
            document.getElementById('snd-scan').play();

            instruct.style.display = 'none';
            bar.style.display = 'block';
            status.innerText = "SCANNING...";

            let w = 0;
            const timer = setInterval(() => {
                w += Math.random() * 20;
                if (w >= 100) {
                    w = 100;
                    clearInterval(timer);
                    status.innerText = "ACCESS GRANTED";
                    status.style.color = "#00ff41";
                    document.getElementById('snd-success').play();
                    setTimeout(() => {
                        document.getElementById('login-overlay').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('login-overlay').style.display = 'none';
                            typeTitle();
                        }, 800);
                    }, 1000);
                }
                progress.style.width = w + "%";
            }, 150);
        }

        function transitionToDossier() {
            const loader = document.getElementById('loader-overlay');
            const bar = document.getElementById('load-bar');
            const text = document.getElementById('load-text');
            loader.style.display = 'flex';
            document.getElementById('snd-scan').play();
            
            let width = 0;
            const interval = setInterval(() => {
                width += Math.random() * 25;
                if (width >= 100) {
                    width = 100;
                    clearInterval(interval);
                    text.innerText = "FILE_READY";
                    text.style.color = "#00ff41";
                    document.getElementById('snd-success').play();
                    setTimeout(() => { window.location.href = "about.html"; }, 600);
                }
                bar.style.width = width + "%";
            }, 100);
        }

        function typeTitle() {
            const title = document.getElementById('title-text');
            const str = "CENTRAL_ARCHIVE";
            let i = 0;
            const t = setInterval(() => {
                title.innerHTML += str[i];
                i++;
                if (i >= str.length) clearInterval(t);
            }, 100);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
