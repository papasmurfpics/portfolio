<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLICE_ARCHIVE_TPD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cursor"></div>

    <div id="login-overlay" onclick="startScan()">
        <div style="font-family: 'DotGothic16'; color: var(--neon);">警視庁 - 認証</div>
        <h2 id="status-text" style="font-size: 3.5rem; color: #fff; letter-spacing: 8px;">RESTRICTED</h2>
        
        <div class="scan-bar-container" id="bar-frame">
            <div id="scan-fill"></div>
        </div>
        
        <p id="prompt" style="margin-top: 20px; color: var(--dim); letter-spacing: 3px;">[ CLICK TO SCAN BIOMETRICS ]</p>
    </div>

    <div class="hud-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="hud-data" style="grid-column: 1;">
            DEPT: TOKYO_METRO_PD<br>UNIT: CYBER_DIV_09
        </div>
        <div class="hud-data" style="grid-column: 3; text-align: right;">
            TIME: <span id="live-clock">00:00:00</span>
        </div>

        <main class="main-display">
            <h1 class="subject-name" id="typewriter-title"></h1>
            <nav class="nav-group">
                <a href="about.html" class="nav-item">> OFFICER_DOSSIER</a>
                <a href="projects.html" class="nav-item">> SERVICE_RECORDS</a>
            </nav>
        </main>

        <div class="hud-data" style="grid-row: 3; align-self: end;">
            LAT: 35.6895° N<br>LNG: 139.6917° E
        </div>
    </div>

    <audio id="snd-scan" src="https://www.soundjay.com/button/sounds/button-20.mp3"></audio>
    <audio id="snd-success" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Biometric Scan Sequence
        function startScan() {
            const barFrame = document.getElementById('bar-frame');
            const fill = document.getElementById('scan-fill');
            const status = document.getElementById('status-text');
            const prompt = document.getElementById('prompt');
            const sndScan = document.getElementById('snd-scan');
            const sndSuccess = document.getElementById('snd-success');

            // 1. Start Visuals
            prompt.style.display = 'none';
            barFrame.style.display = 'block';
            status.innerText = "SCANNING...";
            sndScan.play();

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // 2. Success Sequence
                    status.innerText = "ACCESS GRANTED";
                    status.style.color = "#00ff41";
                    sndSuccess.play();
                    
                    setTimeout(() => {
                        document.getElementById('login-overlay').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('login-overlay').style.display = 'none';
                            runTypewriter();
                        }, 800);
                    }, 1000);
                } else {
                    width += Math.random() * 15;
                    if (width > 100) width = 100;
                    fill.style.width = width + "%";
                }
            }, 200);
        }

        // Typewriter Effect
        function runTypewriter() {
            const title = document.getElementById('typewriter-title');
            const text = "CENTRAL_ARCHIVE";
            let i = 0;
            function type() {
                if (i < text.length) {
                    title.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // Clock
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
